<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Costa Rica Scrapbook</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Patrick+Hand&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #f7f1e8;
      font-family: 'Patrick Hand', cursive;
      color: #3a2e2a;
    }

    header {
      text-align: center;
      padding: 2rem 1rem;
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      background: linear-gradient(135deg, #ffb347, #ff6b6b);
      color: white;
      letter-spacing: 2px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 1.5rem;
    }

    .location {
      margin-bottom: 3.5rem;
      padding: 1.5rem;
      background: #fffaf3;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      position: relative;
    }

    .location::before {
      content: "📍";
      position: absolute;
      top: -10px;
      left: 15px;
      font-size: 1.5rem;
    }

    .location h2 {
      margin-top: 0;
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      text-transform: capitalize;
    }

    .carousel {
      display: flex;
      overflow-x: auto;
      gap: 16px;
      padding: 10px 5px;
      scroll-snap-type: x mandatory;
    }

    .photo-card {
      flex: 0 0 auto;
      background: white;
      padding: 10px 10px 18px;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.12);
      transform: rotate(-1deg);
      scroll-snap-align: start;
    }

    .photo-card:nth-child(even) {
      transform: rotate(1.5deg);
    }

    .photo-card img {
      height: 240px;
      width: 180px;
      object-fit: cover;
      border-radius: 8px;
      display: block;
    }

    .caption {
      margin-top: 6px;
      font-size: 0.9rem;
      opacity: 0.8;
      text-align: center;
    }

    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.9rem;
      opacity: 0.7;
    }

    /* scrollbar aesthetic */
    .carousel::-webkit-scrollbar {
      height: 6px;
    }

    .carousel::-webkit-scrollbar-thumb {
      background: #e0c3a3;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<header>
  Costa Rica Scrapbook ✈️🌴
</header>

<div class="container" id="gallery"></div>

<footer>
  Tru Travels Costa Rica 🇨🇷 · Come travel with me
</footer>

<script>
  const locations = [
    "santa-teresa",
    "la-fortuna",
    "monteverde"
  ];

  const gallery = document.getElementById("gallery");

  locations.forEach(location => {
    const section = document.createElement("div");
    section.className = "location";

    const title = document.createElement("h2");
    title.innerText = location.replace("-", " ");

    const carousel = document.createElement("div");
    carousel.className = "carousel";

    for (let i = 1; i <= 20; i++) {
      const card = document.createElement("div");
      card.className = "photo-card";

      const img = document.createElement("img");
      img.src = `images/${location}/${i}.jpg`;

      const caption = document.createElement("div");
      caption.className = "caption";
      caption.innerText = `moment ${i}`;

      img.onerror = () => card.remove();

      card.appendChild(img);
      card.appendChild(caption);
      carousel.appendChild(card);
    }

    section.appendChild(title);
    section.appendChild(carousel);
    gallery.appendChild(section);
  });
</script>

</body>
</html>
